version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: carsync_postgres
    environment:
      POSTGRES_USER: carsync_user
      POSTGRES_PASSWORD: carsync_password
      POSTGRES_DB: carsync_expenses_db
    ports:
      - '5433:5432'  # Use port 5433 on host to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carsync_user -d carsync_expenses_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carsync_backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://carsync_user:carsync_password@postgres:5432/carsync_expenses_db
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
